name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint · typecheck · unit · build · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Electron needs a display; xvfb-run provides a headless one on Linux.
      - run: xvfb-run -a playwright test --config tests/e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # **M7 C91 — sqlite-vec platform smoke (promt22 D1 hard gate).** Verifies
  # that `better-sqlite3` builds + `sqlite-vec` loads + the `vec0` virtual
  # table executes basic ops on all three target platforms before C92
  # (workspace-store migration to sqlite) is allowed to land. Promt22
  # explicitly: "If smoke fails on any platform, fall back to LanceDB OR
  # defer workspace migration to separate later milestone. Don't proceed
  # with double-or-nothing without verification."
  #
  # All three jobs must be green to clear the gate. Failure on any
  # platform surfaces the smoke script's diagnostic + blocks C92 until
  # the contingency is picked.
  rag-platform-smoke:
    name: rag-platform-smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @mcp-studio/rag smoke
