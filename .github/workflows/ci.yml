name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint · typecheck · unit · build · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # Electron needs a display; xvfb-run provides a headless one on Linux.
      - run: xvfb-run -a playwright test --config tests/e2e/playwright.config.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
